<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dog Breed Explorer</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="container">
            <header>
                <h1>🐕 Dog Breed Explorer</h1>
                <p>Learn about dog breeds and look at some adorable photos!</p>
            </header>

            <main>
                <!-- Search Section -->
                <section class="search-section">
                    <h2>Search Dog Breeds</h2>
                    <div class="search-container">
                        <input type="text" id="breedSearch"
                            placeholder="Enter a breed name (e.g., labrador, golden, poodle) or part of a breed name (e.g., cat for cattledog)"
                            class="search-input">
                        <button id="searchBtn" class="btn btn-search">Search</button>
                    </div>
                </section>

                <!-- Random Dog Section -->
                <section class="random-section">
                    <h2>Random Dog Images</h2>
                    <button id="randomBtn" class="btn btn-random">Show me some cuties!</button>
                </section>
            </main>

            <footer>
                <p>Powered by Dog API | Created with ❤️</p>
            </footer>
        </div>

        <!-- Error -->
        <div id="errorModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>❌ Oops! Something went wrong, try again</h2>
                <p id="errorMessage"></p>
                <button id="errorBtn" class="btn btn-search">Try Again</button>
            </div>
        </div>

        <script src="script.js"></script>
    </body>

</html>
