<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Breed Results - Dog Breed Explorer</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="container">
            <header>
                <h1>Dog Breed Explorer</h1>
                <p>Discover dog breeds and adorable puppy pictures!</p>
            </header>

            <main>
                <!-- Back Button -->
                <div class="back-button-container">
                    <button onclick="window.location.href='index.html'" class="btn btn-back">← Back to Home</button>
                </div>

                <!-- Breed Info Results -->
                <div id="breedResults" class="results-section">
                    <h2 id="breedTitle"></h2>
                    <div id="breedContent"></div>
                    <div class="navigation-buttons">
                        <button onclick="window.location.href='index.html'" class="btn btn-back">← Back to Home</button>
                        <button onclick="window.location.href='random-results.html'" class="btn btn-search">Get Random
                            Dog →</button>
                    </div>
                </div>
            </main>

            <footer>
                <p>Created with Dog API </p>
            </footer>
        </div>

        <!-- Error Modal -->
        <div id="errorModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Oops! Something went wrong</h2>
                <p id="errorMessage"></p>
                <button id="errorBtn" class="btn btn-search">Try Again</button>
            </div>
        </div>

        <script src="breed-results.js"></script>
    </body>

</html>
